      - mongodb
    networks:
      - app-network
    restart: unless-stopped

  calendar-app-client:
    build: ./apps/calendar-app/client
    container_name: calendar-app-client
    ports:
      - "5174:5173"
    environment:
      - VITE_API_URL=http://localhost:5002
