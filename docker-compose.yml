services:
  mongodb:
    image: mongo:latest
    container_name: mongodb-dev
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - app-network
    restart: unless-stopped

  blog-platform-server:
    build: ./apps/blog-platform/server
    container_name: blog-platform-server
    ports:
      - "5005:5005"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/blog-platform
      - PORT=5005
      - CLIENT_ORIGIN=http://localhost:5173
    volumes:
      - ./apps/blog-platform/server:/app
    depends_on:
      - mongodb
    networks:
      - app-network
    restart: unless-stopped

  blog-platform-client:
    build: ./apps/blog-platform/client
    container_name: blog-platform-client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5005
    volumes:
      - ./apps/blog-platform/client:/app
    networks:
      - app-network
    restart: unless-stopped

  calendar-app-server:
    build: ./apps/calendar-app/server
    container_name: calendar-app-server
    ports:
      - "5002:5002"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/calendar-app
      - PORT=5002
      - CLIENT_URL=http://localhost:5174
    volumes:
      - ./apps/calendar-app/server:/app
